<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Live Demo</title>
  <style>
    :root {
      --bg: #0d1b2a;
      --panel: #1b263b;
      --ink: #e0e1dd;
      --muted: #7d8ca3;
      --signal: #00e5a0;
      --wire: #2c3e57;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--wire);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .4);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--signal);
      margin-bottom: 24px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--signal);
      box-shadow: 0 0 0 0 rgba(0, 229, 160, .6);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(0, 229, 160, .6);
      }

      70% {
        box-shadow: 0 0 0 14px rgba(0, 229, 160, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(0, 229, 160, 0);
      }
    }

    h1 {
      font-size: clamp(30px, 8vw, 44px);
      line-height: 1.1;
      margin-bottom: 16px;
      font-weight: 800;
    }

    h1 .accent {
      color: var(--signal);
    }

    p.lead {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .pipeline {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .step {
      background: var(--bg);
      border: 1px solid var(--wire);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
    }

    .arrow {
      color: var(--signal);
      font-size: 18px;
    }

    .version {
      font-size: 14px;
      color: var(--muted);
      border-top: 1px solid var(--wire);
      padding-top: 20px;
    }

    .version b {
      color: var(--ink);
      font-weight: 700;
    }

    @media (prefers-reduced-motion: reduce) {
      .dot {
        animation: none;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="status"><span class="dot"></span> Live pe internet</div>
    <h1>Salut de la <span class="accent">Timisoara</span> 👋</h1>
    <p class="lead">
      Pagina asta a ajuns pe telefonul tău fără ca nimeni s-o publice manual.
      Cineva a scris cod, a dat push, iar un robot a făcut restul.
    </p>
    <div class="pipeline">
      <span class="step">Cod</span>
      <span class="arrow">→</span>
      <span class="step">git push</span>
      <span class="arrow">→</span>
      <span class="step">GitHub Actions</span>
      <span class="arrow">→</span>
      <span class="step">Live 🌍</span>
    </div>
    <div class="version">
      Versiunea afișată: <b>1.0</b>
    </div>
  </main>
</body>

</html>
